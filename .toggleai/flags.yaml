version: 1
project: my-app

flags:
  new-checkout:
    name: "New Checkout Flow"
    type: boolean
    tags: [frontend, experiment]
    permanent: false
    environments:
      production:
        enabled: true
        rollout_percentage: 50
      staging:
        enabled: true
        rollout_percentage: 80
    variations:
      - key: control
        value: false
      - key: variant_a
        value: true

configs:
  api_timeout_ms:
    type: number
    environments:
      production: { value: 5000 }
      staging:    { value: 10000 }
